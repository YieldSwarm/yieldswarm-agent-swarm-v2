version: "2.0"
services:
  frontend:
    image: ghcr.io/yieldswarm/yieldswarm-arena:latest
    expose:
      - port: 3000
        as: 80
        to:
          - global: true

  gpu-worker:
    image: ghcr.io/yieldswarm/yieldswarm-worker:latest
    params:
      storage:
        mount:
          /models: 50Gi
    expose:
      - port: 11434
        as: 11434
        to:
          - global: true
    env:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/models
    resources:
      gpu:
        units: 1
        attributes:
          vendor: nvidia
