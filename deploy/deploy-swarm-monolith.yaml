version: "2.0"

services:
  arena:
    image: ghcr.io/yieldswarm/yieldswarm-arena:latest
    expose:
      - port: 3000
        as: 80
        to:
          - global: true
    env:
      - NEXT_PUBLIC_API_BASE_URL=https://yieldswarm-v2.vercel.app

  worker:
    image: ghcr.io/yieldswarm/yieldswarm-worker:latest
    expose:
      - port: 11434
        as: 11434
        to:
          - global: false
    env:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_GPU=1
    resources:
      cpu:
        units: 6
      memory:
        size: 24Gi
      storage:
        size: 100Gi
      gpu:
        units: 1
        attributes:
          vendor:
            nvidia:
              - model: rtx3090
                ram: "24Gi"

profiles:
  compute:
    worker:
      resources:
        cpu:
          units: 6
        memory:
          size: 24Gi
        storage:
          size: 100Gi
        gpu:
          units: 1

  placement:
    primary:
      attributes:
        region: us-west
      signedBy:
        anyOf:
          - "akash1..."  # Replace with actual audited provider address like provider.europlots.com

deployment:
  arena:
    primary:
      profile: compute
      count: 1
  worker:
    primary:
      profile: compute
      count: 2  # Start with 2x RTX 3090 using your $170 credit